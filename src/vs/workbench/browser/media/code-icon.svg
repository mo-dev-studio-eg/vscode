<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="VS Code modern flat logo">
  <defs>
    <linearGradient id="g-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="g-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="960" height="960" rx="208" ry="208" fill="url(#g-bg)"/>

  <!-- Soft inner highlight -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180" fill="#ffffff" fill-opacity="0.06"/>

  <!-- Abstract "VS" mark built from two overlapping angled shapes -->
  <!-- Left bracket "<" -->
  <path d="M360 320 L240 512 L360 704"
        fill="none" stroke="#ffffff" stroke-width="64" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket ">" -->
  <path d="M664 320 L784 512 L664 704"
        fill="none" stroke="#ffffff" stroke-width="64" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Middle slash "/" accent -->
  <path d="M560 240 L464 784"
        fill="none" stroke="url(#g-accent)" stroke-width="48" stroke-linecap="round"/>

  <!-- Subtle glow dot top-right -->
  <circle cx="820" cy="220" r="36" fill="#ffffff" fill-opacity="0.18" filter="url(#soft)"/>
</svg>
